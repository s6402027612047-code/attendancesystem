<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ลงทะเบียนใบหน้า · Attendance Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0b1220;
    --navy-900:#101a2c;
    --navy-800:#16223b;
    --navy-700:#1f2f4d;
    --amber:#f4a623;
    --mint:#3ddc97;
    --red:#ff6b6b;
    --ink-0:#f4f6fb;
    --ink-1:#aab4c8;
    --ink-2:#6b7a96;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(244,166,35,0.10), transparent 55%),
      var(--navy-950);
    font-family:"Inter", sans-serif;
    color:var(--ink-0);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .sheet{ width:100%; max-width:420px; }

  .topstrip{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 0 4px rgba(244,166,35,0.18);
  }
  .brand span{
    font-family:"Space Grotesk", sans-serif;
    font-size:13px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--ink-2);
  }
  .badge{
    font-size:11px; letter-spacing:0.08em; color:var(--ink-2);
    border:1px solid var(--navy-700); padding:4px 9px; border-radius:20px;
    font-family:"Space Grotesk", sans-serif;
  }

  h1{
    font-family:"Space Grotesk", sans-serif;
    font-size:25px; font-weight:700; line-height:1.25;
    margin:4px 0 4px;
  }
  .sub{ color:var(--ink-1); font-size:14px; margin:0 0 22px; line-height:1.6; }

  .card{
    background:linear-gradient(180deg, var(--navy-800), var(--navy-900));
    border:1px solid var(--navy-700);
    border-radius:20px;
    padding:20px;
  }

  label{
    display:block; font-size:11.5px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--ink-2); margin:0 0 6px;
    font-family:"Space Grotesk", sans-serif;
  }
  .field{ margin-bottom:14px; }
  input{
    width:100%;
    background:var(--navy-950);
    border:1px solid var(--navy-700);
    border-radius:10px;
    padding:13px 14px;
    font-size:15px;
    color:var(--ink-0);
    font-family:"Inter", sans-serif;
    outline:none;
    transition:border-color .15s;
  }
  input::placeholder{ color:var(--ink-2); }
  input:focus{ border-color:var(--amber); }

  .viewfinder{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    margin:6px 0 16px;
  }
  video{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transform:scaleX(-1);
  }
  .corner{
    position:absolute; width:26px; height:26px;
    border:3px solid var(--amber); opacity:0.9;
  }
  .corner.tl{ top:14px; left:14px; border-right:none; border-bottom:none; border-radius:6px 0 0 0; }
  .corner.tr{ top:14px; right:14px; border-left:none; border-bottom:none; border-radius:0 6px 0 0; }
  .corner.bl{ bottom:14px; left:14px; border-right:none; border-top:none; border-radius:0 0 0 6px; }
  .corner.br{ bottom:14px; right:14px; border-left:none; border-top:none; border-radius:0 0 6px 0; }
  .scanline{
    position:absolute; left:14px; right:14px; height:2px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    top:50%;
    animation:sweep 2.4s ease-in-out infinite;
    opacity:0.85;
  }
  @keyframes sweep{
    0%,100%{ top:18%; opacity:0; }
    15%{ opacity:0.85; }
    50%{ top:82%; opacity:0.85; }
    85%{ opacity:0.85; }
  }
  @media (prefers-reduced-motion: reduce){
    .scanline{ animation:none; opacity:0.5; top:50%; }
  }

  button{
    width:100%; padding:15px; font-size:15px; font-weight:600;
    font-family:"Space Grotesk", sans-serif; letter-spacing:0.02em;
    border:none; border-radius:12px;
    background:var(--amber); color:#1a1206;
    cursor:pointer;
    transition:transform .12s, opacity .15s;
  }
  button:active{ transform:scale(0.98); }
  button:disabled{ background:var(--navy-700); color:var(--ink-2); cursor:default; }

  #status{
    margin-top:14px; font-size:13.5px; text-align:center; line-height:1.5; min-height:18px;
  }
  #status.ok{ color:var(--mint); }
  #status.err{ color:var(--red); }

  .foot{
    text-align:center; color:var(--ink-2); font-size:12px;
    margin-top:20px; letter-spacing:0.02em;
  }
</style>
</head>
<body>

<div class="sheet">

  <div class="topstrip">
    <div class="brand">
      <span class="dot"></span>
      <span>Attendance Clock</span>
    </div>
    <div class="badge">ลงทะเบียน</div>
  </div>

  <h1>เพิ่มข้อมูลใบหน้าพนักงาน</h1>
  <p class="sub">กรอกชื่อแล้ววางหน้าให้อยู่ในกรอบ ระบบจะบันทึกข้อมูลใบหน้าไว้ใช้สแกนเข้า-ออกงาน</p>

  <div class="card">

    <div class="field">
      <label>ชื่อ-นามสกุล</label>
      <input id="name" placeholder="เช่น นายก้อง วศิน">
    </div>

    <div class="field">
      <label>แผนก (จำเป็น)</label>
      <input id="department" placeholder="เช่น R&D วิจัยและพัฒนา">
    </div>

    <label>วางใบหน้าในกรอบ</label>
    <div class="viewfinder">
      <video id="video" autoplay playsinline muted></video>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scanline"></div>
    </div>

    <button id="captureBtn" disabled>กำลังโหลดระบบจดจำใบหน้า...</button>

    <div id="status"></div>
  </div>

  <div class="foot">ข้อมูลใบหน้านี้ใช้สำหรับยืนยันตัวตนตอนลงเวลาเข้า-ออกงานเท่านั้น</div>

</div>


<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
// ⚠️ ต้องตรงกับ API_SECRET ใน Code.gs และต้องเป็นค่าเดียวกันทุกหน้า
const API_SECRET = "ํTEST_API_V01";
// ⚠️ วาง URL ของ Web App ที่ deploy แล้วตรงนี้
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwYKGuOJTYPf8dg7NSpIjARtQwNNDZ4fdbBfPBs7uhG3-Ck3sJMGhfrGIjsUU6d91liJQ/exec";

const video = document.getElementById("video");
const captureBtn = document.getElementById("captureBtn");
const statusEl = document.getElementById("status");

let modelsLoaded = false;

async function init() {
  // โหลดโมเดลจาก CDN (ไม่ต้องเก็บไฟล์โมเดลเอง)
  const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
  await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

  modelsLoaded = true;
  captureBtn.disabled = false;
  captureBtn.textContent = "📸 ถ่ายภาพและลงทะเบียน";

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

async function captureAndRegister() {
  const name = document.getElementById("name").value.trim();
  const department = document.getElementById("department").value.trim();

  if (!name) {
    setStatus("กรุณากรอกชื่อ-นามสกุล", false);
    return;
  }
  if (!modelsLoaded) return;

  captureBtn.disabled = true;
  setStatus("กำลังตรวจจับใบหน้า...", true);

  const detection = await faceapi
    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceDescriptor();

  if (!detection) {
    setStatus("ไม่พบใบหน้า กรุณาหันหน้าเข้ากล้องให้ชัดเจน", false);
    captureBtn.disabled = false;
    return;
  }

  const descriptor = Array.from(detection.descriptor);

  setStatus("กำลังบันทึกข้อมูล...", true);

  try {
    const res = await fetch(WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "register",
        secret: API_SECRET,
        name: name,
        department: department,
        descriptor: descriptor
      })
    });
    const data = await res.json();

    if (data.status === "success") {
      setStatus("✅ ลงทะเบียนสำเร็จ! รหัสพนักงาน: " + data.empid, true);
      document.getElementById("name").value = "";
      document.getElementById("department").value = "";
    } else {
      setStatus("❌ " + data.message, false);
    }
  } catch (err) {
    setStatus("❌ เชื่อมต่อไม่สำเร็จ: " + err.message, false);
  }

  captureBtn.disabled = false;
}

function setStatus(msg, ok) {
  statusEl.textContent = msg;
  statusEl.className = ok ? "ok" : "err";
}

captureBtn.addEventListener("click", captureAndRegister);
window.addEventListener("load", init);
</script>

</body>
</html>
