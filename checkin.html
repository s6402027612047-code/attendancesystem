<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ลงเวลาเข้า-ออกงาน</title>
<style>
:root{
    --navy-950:#0b1220;
    --navy-900:#101a2c;
    --navy-800:#16223b;
    --navy-700:#1f2f4d;
    --amber:#f4a623;
    --mint:#3ddc97;
    --red:#ff6b6b;
    --ink-0:#f4f6fb;
    --ink-1:#aab4c8;
    --ink-2:#6b7a96;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(244,166,35,0.10), transparent 55%),
      var(--navy-950);
    font-family:"Inter", sans-serif;
    color:var(--ink-0);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .sheet{ width:100%; max-width:420px; }

  .topstrip{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 0 4px rgba(244,166,35,0.18);
  }
  .brand span{
    font-family:"Space Grotesk", sans-serif;
    font-size:13px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--ink-2);
  }
  #clock{
    font-family:"Space Grotesk", sans-serif;
    font-size:13px; color:var(--ink-1);
    letter-spacing:0.04em;
  }

  h1{
    font-family:"Space Grotesk", sans-serif;
    font-size:25px; font-weight:700; line-height:1.25;
    margin:4px 0 4px;
  }
  .sub{ color:var(--ink-1); font-size:14px; margin:0 0 22px; line-height:1.6; }

  .card{
    background:linear-gradient(180deg, var(--navy-800), var(--navy-900));
    border:1px solid var(--navy-700);
    border-radius:20px;
    padding:20px;
  }

  .viewfinder{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    margin-bottom:14px;
    transition:box-shadow .2s;
  }
  .viewfinder.matched{ box-shadow:0 0 0 3px rgba(61,220,151,0.6); }
  .viewfinder.unmatched{ box-shadow:0 0 0 3px rgba(255,107,107,0.45); }
  video{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transform:scaleX(-1);
  }
  .corner{
    position:absolute; width:26px; height:26px;
    border:3px solid var(--amber); opacity:0.9;
    transition:border-color .2s;
  }
  .corner.tl{ top:14px; left:14px; border-right:none; border-bottom:none; border-radius:6px 0 0 0; }
  .corner.tr{ top:14px; right:14px; border-left:none; border-bottom:none; border-radius:0 6px 0 0; }
  .corner.bl{ bottom:14px; left:14px; border-right:none; border-top:none; border-radius:0 0 0 6px; }
  .corner.br{ bottom:14px; right:14px; border-left:none; border-top:none; border-radius:0 0 6px 0; }
  .viewfinder.matched .corner{ border-color:var(--mint); }
  .viewfinder.unmatched .corner{ border-color:var(--red); }

  .idtag{
    position:absolute;
    bottom:14px; left:14px; right:14px;
    background:rgba(11,18,32,0.72);
    backdrop-filter:blur(2px);
    border-radius:10px;
    padding:8px 12px;
    font-family:"Space Grotesk", sans-serif;
    font-size:13px;
    text-align:center;
    color:var(--ink-0);
  }

  .row{ display:flex; gap:10px; }
  button{
    flex:1;
    padding:16px;
    font-size:15px;
    font-weight:600;
    font-family:"Space Grotesk", sans-serif;
    letter-spacing:0.02em;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:transform .12s, opacity .15s;
  }
  button:active{ transform:scale(0.98); }
  button:disabled{ background:var(--navy-700) !important; color:var(--ink-2) !important; cursor:default; }
  #inBtn{ background:var(--mint); color:#06281a; }
  #outBtn{ background:var(--red); color:#2a0a0a; }

  #status{
    margin-top:14px; font-size:13.5px; text-align:center; line-height:1.5; min-height:18px;
  }
  #status.ok{ color:var(--mint); }
  #status.err{ color:var(--red); }

  .foot{
    text-align:center; color:var(--ink-2); font-size:12px;
    margin-top:20px; letter-spacing:0.02em;
  }
</style>
</head>
<body>

<h2>🕒 ลงเวลาเข้า-ออกงาน</h2>

<video id="video" autoplay playsinline muted></video>

<div id="detected">กำลังเตรียมระบบ...</div>

<div class="row">
  <button id="inBtn" disabled>✅ CHECK IN</button>
  <button id="outBtn" disabled>🚪 CHECK OUT</button>
</div>

<div id="status"></div>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
// ⚠️ ต้องตรงกับ API_SECRET ใน Code.gs และต้องเป็นค่าเดียวกันทุกหน้า
const API_SECRET = "ํTEST_API_V01";
// ⚠️ วาง URL ของ Web App ที่ deploy แล้วตรงนี้
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwYKGuOJTYPf8dg7NSpIjARtQwNNDZ4fdbBfPBs7uhG3-Ck3sJMGhfrGIjsUU6d91liJQ/exec";
const FACE_MATCH_THRESHOLD = 0.5;

const video = document.getElementById("video");
const inBtn = document.getElementById("inBtn");
const outBtn = document.getElementById("outBtn");
const statusEl = document.getElementById("status");
const detectedEl = document.getElementById("detected");

let employees = [];
let currentMatch = null;
let modelsLoaded = false;

async function init() {
  const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
  await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
  modelsLoaded = true;

  detectedEl.textContent = "กำลังโหลดรายชื่อพนักงาน...";
  const res = await fetch(
    WEBAPP_URL + "?action=getEmployees&secret=" + encodeURIComponent(API_SECRET)
  );
  const data = await res.json();
  if (data.status === "success") {
    employees = data.data;
    detectedEl.textContent = "หันหน้าเข้ากล้องเพื่อสแกน...";
  } else {
    detectedEl.textContent = "โหลดรายชื่อพนักงานไม่สำเร็จ: " + data.message;
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  recognizeLoop();
}

async function recognizeLoop() {
  setInterval(async () => {
    if (!modelsLoaded || employees.length === 0) return;

    const detection = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      currentMatch = null;
      detectedEl.textContent = "ไม่พบใบหน้า กรุณาหันหน้าเข้ากล้อง";
      inBtn.disabled = true;
      outBtn.disabled = true;
      return;
    }

    let best = null;
    let bestDist = Infinity;

    for (const emp of employees) {
      const dist = faceapi.euclideanDistance(detection.descriptor, emp.descriptor);
      if (dist < bestDist) {
        bestDist = dist;
        best = emp;
      }
    }

    if (best && bestDist < FACE_MATCH_THRESHOLD) {
      currentMatch = best;
      detectedEl.textContent = "✅ พบ: " + best.name + " (" + best.empid + ")";
      inBtn.disabled = false;
      outBtn.disabled = false;
    } else {
      currentMatch = null;
      detectedEl.textContent = "❌ ไม่พบในระบบ ไม่สามารถลงเวลาได้";
      inBtn.disabled = true;
      outBtn.disabled = true;
    }
  }, 1000);
}

function getLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: true,
      timeout: 10000
    });
  });
}

function captureSnapshot() {
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.7);
}

async function submitAttendance(action) {
  if (!currentMatch) return;

  inBtn.disabled = true;
  outBtn.disabled = true;
  setStatus("กำลังตรวจสอบตำแหน่ง GPS...", true);

  let pos;
  try {
    pos = await getLocation();
  } catch (err) {
    setStatus("❌ ไม่สามารถดึงตำแหน่ง GPS ได้ กรุณาเปิดอนุญาตตำแหน่ง", false);
    inBtn.disabled = false;
    outBtn.disabled = false;
    return;
  }

  setStatus("กำลังส่งข้อมูล...", true);
  const image = captureSnapshot();

  try {
    const res = await fetch(WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: action,
        secret: API_SECRET,
        empid: currentMatch.empid,
        name: currentMatch.name,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        image: image
      })
    });
    const data = await res.json();

    if (data.status === "success") {
      setStatus("✅ " + data.message + " (ห่างจุดออฟฟิศ " + data.distance + " ม.)", true);
    } else {
      setStatus("❌ " + data.message, false);
    }
  } catch (err) {
    setStatus("❌ เชื่อมต่อไม่สำเร็จ: " + err.message, false);
  }

  inBtn.disabled = false;
  outBtn.disabled = false;
}

function setStatus(msg, ok) {
  statusEl.textContent = msg;
  statusEl.className = ok ? "ok" : "err";
}

inBtn.addEventListener("click", () => submitAttendance("checkin"));
outBtn.addEventListener("click", () => submitAttendance("checkout"));
window.addEventListener("load", init);
</script>

</body>
</html>
